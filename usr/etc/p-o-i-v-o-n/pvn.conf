# ─────────────────────────────────────────────────────
# POIVON - Configuração Principal
# PVN S¥STEM | AGENTE POIVON | skill yb POIVON
# Beta Edition — branch1
# ─────────────────────────────────────────────────────

# Versão do agente
AGENT_VERSION="2.0.0-beta"

# Canal de distribuição
RELEASE_CHANNEL="beta"

# Branch ativa
BRANCH_NAME="branch2"

# Splash screen ativa (true/false)
SPLASH_SCREEN=true

# Indicador de estado ativo (true/false)
STATE_INDICATOR=true

# Firebase ativo por padrão (true/false)
FIREBASE_ACTIVE=false

# Projeto Firebase
FIREBASE_PROJECT="agente-poivon"

# Caminho base do usuário
WORK_DIR="$HOME/storage/shared/POIVON"

# Editor padrão
EDITOR="nano"

# Porta do servidor local
SERVER_PORT=8080

# Idioma
LANGUAGE="pt-BR"

# Log de ações
LOG_ACTIONS=true

# ── LLM (v2.0) — Version: v2.0.0 ──
# Chave da API (NUNCA commitar com valor preenchido)
LLM_API_KEY=""
LLM_MODEL="claude-sonnet-4-6"
LLM_MAX_TOKENS=4096

# ── Firebase v2 (credenciais reais — NUNCA commitar preenchidas) ──
FIREBASE_WEB_API_KEY=""
FIREBASE_EMAIL=""
FIREBASE_SENHA=""
